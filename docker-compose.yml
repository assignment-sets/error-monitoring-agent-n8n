services:
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.10.2
    user: root
    environment:
      - ELASTIC_HOST=${ELASTIC_HOST}
      - ELASTIC_UNAME=${ELASTIC_UNAME}
      - ELASTIC_PASSWD=${ELASTIC_PASSWD}
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./:/app/:ro 
    command: >
      bash -c "
      filebeat setup -e;
      filebeat -e
      "